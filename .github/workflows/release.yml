name: Build and sign release

"on":
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build and release (e.g. v1.0.1). Leave blank to just test build+sign without publishing.'
        required: false
        type: string

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=test-build" >> "$GITHUB_OUTPUT"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch full tag history
        if: steps.ver.outputs.publish == 'true'
        run: git fetch --tags --force

      - name: Compute versionCode and stamp module.prop
        if: steps.ver.outputs.publish == 'true'
        id: stamp
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # versionCode = number of existing release tags (this one included),
          # so it always increments by exactly 1 per release with zero manual
          # bookkeeping. Counts annotated + lightweight tags matching v*.*.*.
          EXISTING_COUNT="$(git tag -l 'v*.*.*' | grep -vx "$VERSION" | wc -l)"
          VCODE=$((EXISTING_COUNT + 1))
          echo "vcode=$VCODE" >> "$GITHUB_OUTPUT"

          # Stamp both fields into module.prop for THIS BUILD ONLY — the repo's
          # committed module.prop is left untouched; this only affects the zip
          # that gets built and released.
          sed -i "s/^version=.*/version=$VERSION/" module.prop
          sed -i "s/^versionCode=.*/versionCode=$VCODE/" module.prop
          echo "--- module.prop for this release ---"
          cat module.prop

      - name: Build module zip
        run: |
          ZIP="FrEeRuNnErKeRnEl_MoDuLe-${{ steps.ver.outputs.version }}.zip"
          zip -r "$ZIP" \
            module.prop customize.sh post-fs-data.sh service.sh \
            boot-completed.sh uninstall.sh \
            scripts/probe.sh scripts/apply.sh scripts/watchdog.sh \
            webroot/index.html icon/icon.png \
            -x '*.DS_Store'
          echo "ZIP_NAME=$ZIP" >> "$GITHUB_ENV"

      - name: Generate SHA256SUMS
        run: sha256sum "${{ env.ZIP_NAME }}" > SHA256SUMS

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "default-cache-ttl 600" >> ~/.gnupg/gpg-agent.conf || true

      - name: Sign SHA256SUMS
        run: |
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
            --detach-sign --armor SHA256SUMS

      - name: Extract changelog section for this version
        id: changelog
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Pull everything between this version's "## vX.Y.Z" heading and the
          # next "## " heading (or end of file) out of CHANGELOG.md.
          NOTES="$(awk -v ver="## $VERSION" '
            $0 ~ "^"ver { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md)"
          if [ -z "$NOTES" ]; then
            NOTES="No changelog entry found for $VERSION — see CHANGELOG.md."
          fi
          # GitHub Actions multiline output needs this delimiter form.
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag for manual release
        if: steps.ver.outputs.publish == 'true' && github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.ver.outputs.version }}" -m "FrEeRuNnErKeRnEl MoDuLe ${{ steps.ver.outputs.version }}"
          git push origin "${{ steps.ver.outputs.version }}"

      - name: Create GitHub Release
        if: steps.ver.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          files: |
            ${{ env.ZIP_NAME }}
            SHA256SUMS
            SHA256SUMS.asc
          name: ${{ steps.ver.outputs.version }}
          body: |
            ${{ steps.changelog.outputs.notes }}

            ---
            🔐 Verify before flashing: `gpg --verify SHA256SUMS.asc SHA256SUMS && sha256sum -c SHA256SUMS`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update update.json to point at this release
        if: steps.ver.outputs.publish == 'true'
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          VCODE="${{ steps.stamp.outputs.vcode }}"
          REPO="${{ github.repository }}"
          cat > update.json << EOF
          {
            "version": "$VERSION",
            "versionCode": $VCODE,
            "zipUrl": "https://github.com/$REPO/releases/download/$VERSION/${{ env.ZIP_NAME }}",
            "changelog": "https://raw.githubusercontent.com/$REPO/main/CHANGELOG.md"
          }
          EOF
          cat update.json

      - name: Commit updated update.json
        if: steps.ver.outputs.publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json
          if ! git diff --cached --quiet; then
            git commit -m "Update update.json for ${{ steps.ver.outputs.version }} [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "update.json unchanged — nothing to commit."
          fi

      - name: Manual test-build summary (no release created)
        if: steps.ver.outputs.publish == 'false'
        run: |
          echo "Manual test run — build and signing verified, but no GitHub Release was created."
          echo "Re-run with a version input, or push a tag matching v*.*.*, to publish a real release."
